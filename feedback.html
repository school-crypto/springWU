<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <title>Feedback – Nordtek</title>
</head>
<body>

<nav class="menu">
  <ul>
    <li><a href="index.html" class="no_underline">Hem</a></li>
    <li><a href="om.html" class="no_underline">Om</a></li>
    <li><a href="products.html" class="no_underline">Produkter</a></li>
    <li><a href="feedback.html" class="no_underline">Feedback</a></li>
  </ul>
</nav>

<div class="fade_layer"></div>

<div class="wrapper_feedback">

  <header>
    <button class="menu_button" aria-label="Öppna meny">
      <i class="material-icons">menu</i>
    </button>
    <h1 class="brand"><a href="index.html" class="no_underline"><img src="img/Nordtek.png" alt="Nordtek logga"></a></h1>
  </header>

  <main class="feedback_main">
    <h2>Lämna feedback</h2>
    <p>Vi uppskattar din åsikt! Fyll i formuläret nedan så återkommer vi så snart vi kan.</p>

    <div class="feedback_form">

      <div class="form_group">
        <label for="firstname">Förnamn</label>
        <input type="text" id="firstname" placeholder="Ditt förnamn">
      </div>

      <div class="form_group">
        <label for="lastname">Efternamn</label>
        <input type="text" id="lastname" placeholder="Ditt efternamn">
      </div>

      <div class="form_group">
        <label for="email">E-post</label>
        <input type="email" id="email" placeholder="din@email.se">
      </div>

      <div class="form_group">
        <label for="message">Feedback</label>
        <textarea id="message" rows="10" placeholder="Skriv din feedback här..."></textarea>
      </div>

      <button class="btn feedback_submit">Skicka feedback</button>

    </div>
  </main>

  <footer>
    <h3>Kontakta oss</h3>
    <p>📍 Storgatan 12, 411 38 Göteborg</p>
    <p>📞 <a href="tel:+46317654321" class="no_underline">031-765 43 21</a></p>
    <p>✉️ <a href="mailto:info@nordtek.se" class="no_underline">info@nordtek.se</a></p>
    <p>🕐 Mån–Fre: 09:00–17:00</p>
  </footer>

</div>

<script src="js/main.js"></script>
</body>
</html>
